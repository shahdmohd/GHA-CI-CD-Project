# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  schedule:
    # Runs every day at 09:20 UTC
    - cron: '20 9 * * *'
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # - name: Print Python Version
      #   run: python --version
      - name: Get and Save Python Version
        run: |
          # 1. Get the version string (e.g., "Python 3.11.5")
          PY_VER=$(python --version)
          
          # 2. Save it to the GitHub Environment file
          echo "MY_PYTHON_VERSION=$PY_VER" >> $GITHUB_ENV

      - name: Print the Saved Environment Variable
        run: |
          # 3. Read it using standard shell syntax or GitHub context
          echo "The saved version is: ${{ env.MY_PYTHON_VERSION }}"


      - name: Check current time
        run: date

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
