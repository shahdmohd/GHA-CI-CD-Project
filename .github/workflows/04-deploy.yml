name: 04 CD Workflow

on:
pull_request:
  types: [closed]
  branches:
    - main

workflow_dispatch:

env:
IMAGE_NAME: tiny-health-app
CONTAINER_NAME: tiny-health-container
APP_PORT: "8000"

jobs:
build-and-deploy:
  if: ${{ github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' }}
  runs-on: ubuntu-latest

  steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Set image tag
      id: image-tag
      run: |
        TODAY="$(date -u +%Y-%m-%d)"
        IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
        echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      run: |
        docker build \
          -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
          .

    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: "${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}"
        format: table
        exit-code: "1"
        ignore-unfixed: true
        vuln-type: "os,library"
        severity: "HIGH,CRITICAL"

    - name: Start container
      run: |
        docker run -d \
          --name "${CONTAINER_NAME}" \
          -p "${APP_PORT}:8000" \
          "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

    - name: List running containers
      run: docker ps

    - name: Smoke test deployed app
      run: |
        for attempt in 1 2 3 4 5; do
          response="$(curl --fail --silent "http://127.0.0.1:${APP_PORT}/health")" && {
            echo "Health response body:"
            echo "$response"
            exit 0
          }

          echo "Waiting for app to become ready..."
          sleep 2
        done

        echo "App did not become ready in time."
        docker logs "${CONTAINER_NAME}" || true
        exit 1

    - name: Stop container
      if: always()
      run: docker rm -f "${CONTAINER_NAME}" || true