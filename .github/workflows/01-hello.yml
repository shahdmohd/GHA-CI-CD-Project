# This first workflow is intentionally tiny.
# It helps students see what a GitHub Actions run looks like.
name: Run on PR Merge

on:
  # Run automatically when this workflow file changes.
  
  # push:
  #   paths:
  #     - ".github/workflows/01-hello.yml"
  pull_request:
    types: [closed]
    branches:
      - main
  # Allow a safe manual run from the Actions tab too.
  workflow_dispatch:

jobs:
  say-hello:
    # GitHub provides a fresh runner for the job.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        # This single step is enough to show a full workflow run.
        run: echo "The pull request was successfully merged!"
        # hello